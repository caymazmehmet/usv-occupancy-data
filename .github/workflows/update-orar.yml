name: Update USV Orar Data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"
      timezone: "Europe/Bucharest"
    - cron: "17 6 * * *"
      timezone: "Europe/Bucharest"
    - cron: "17 12 * * *"
      timezone: "Europe/Bucharest"
    - cron: "17 18 * * *"
      timezone: "Europe/Bucharest"

permissions:
  contents: write

concurrency:
  group: update-usv-orar-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update Orar and academic calendar data
        run: |
          python tools/update_occupancy_all.py --scan-max 850 --workers 16

      - name: Commit JSON updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json backup/last-good-*.json || true
          if git diff --cached --quiet; then
            echo "No JSON changes to commit."
          else
            git commit -m "Update USV occupancy data"
            git push
          fi
